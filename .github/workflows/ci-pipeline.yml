name: CI Pipeline for Spring Boot JAR (AuthService)

on:
  push:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      # 1. Clone the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full commit history (needed for Sonar analysis and versioning)

      # 2. Cache Maven dependencies (speeds up builds)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. Verify Docker is available
      - name: Check Docker status
        run: docker info

      # 5. Maven downloads common-events from GitHub Packages to Actions
      - name: Set up Maven settings.xml for GitHub Packages
        run: |
          mkdir -p ~/.m2
          echo '<settings>
            <servers>
              <server>
                <id>github-filter</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>' > ~/.m2/settings.xml

      # 6. Build and test with Maven + Testcontainers
      - name: Build and test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"      # Disable Ryuk for better stability
          MAVEN_OPTS: "-Dmaven.repo.local=.m2"      # Use local Maven cache
        run: |
          mvn -B clean install -e -X -Dspring.test.constructor.autowire.mode=all
        #pkill -f surefirebooter || true           # Kill any stuck test processes

      # 7. Upload test reports if tests fail
      - name: Upload Surefire Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # 8. Prepare JAR for SonarCloud analysis
      - name: Prepare for Sonar analysis
        run: |
          mkdir -p target/unpacked-libs
          unzip -q -j target/*.jar 'BOOT-INF/lib/*.jar' -d target/unpacked-libs || echo "No libraries found in JAR"

      # 9. Static code analysis with SonarCloud
      - name: Check JaCoCo
        run: |
          ls -R target/site/jacoco
          cat target/site/jacoco/jacoco.xml | head -20

      - name: SonarCloud Scan
        run: |
          mvn -B clean verify sonar:sonar \
             -Dsonar.projectKey=juliakaiko_authservice \
            -Dsonar.projectName=authservice \
            -Dsonar.organization=juliakaiko \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.java.binaries=target/classes,target/generated-sources/annotations \
            -Dsonar.java.test.binaries=target/test-classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 10. Create keys for Docker build
      - name: Create keys
        run: |
          mkdir -p src/main/resources/keys
          echo "${{ secrets.PRIVATE_KEY }}" > src/main/resources/keys/private.pem
          echo "${{ secrets.PUBLIC_KEY }}" > src/main/resources/keys/public.pem

      # 11. Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.TOKEN_FOR_AUTHSERVICE }}

      # 12. Build and push Docker image (using local Docker socket)
      - name: Build and Push Docker Image
        if: success()
        run: |
          docker build \
            --build-arg GITHUB_USERNAME=${{ github.actor }} \
            --build-arg GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t juliakaiko94/authservice:latest .
          docker push juliakaiko94/authservice:latest